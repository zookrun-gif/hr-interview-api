server:
  port: 8080

spring:
  application:
    name: hr-interview-api
  profiles:
    active: test
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto

knife4j:
  enable: true

interview:
  realtime:
    capacity:
      max-online-sessions: 20
  report:
    queue:
      enabled: true
      poll-interval-millis: 3000
      batch-size: 1
      max-retry-times: 2
      recover-processing-on-startup: true
      startup-recover-limit: 200

logging:
  file:
    path: logs
  logback:
    rollingpolicy:
      max-history: 30
      max-file-size: 100MB
      total-size-cap: 10GB

app:
  api-access-log:
    enabled: true
    include-body: false
    slow-threshold-ms: 1000
  interview:
    invite-valid-days: 7
