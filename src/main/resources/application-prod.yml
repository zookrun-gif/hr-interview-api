spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://your-mysql-host:3306/hr_interview?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 50
  redis:
    host: ${REDIS_HOST:your-redis-host}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: 3000
    lettuce:
      pool:
        max-active: 64
        max-idle: 16
        min-idle: 8
        max-wait: 3000

knife4j:
  enable: false

openai:
  chat:
    enabled: ${OPENAI_CHAT_ENABLED:true}
    base-url: ${OPENAI_CHAT_BASE_URL:http://106.55.174.126:30088/v1}
    api-key: ${OPENAI_CHAT_API_KEY:}
    model: ${OPENAI_CHAT_MODEL:gpt-5.4-mini}
    timeout-seconds: ${OPENAI_CHAT_TIMEOUT_SECONDS:60}

ai:
  interview-report:
    enabled: ${AI_INTERVIEW_REPORT_ENABLED:true}
    max-content-chars: ${AI_INTERVIEW_REPORT_MAX_CONTENT_CHARS:18000}
    min-effective-answer-count: ${AI_INTERVIEW_REPORT_MIN_EFFECTIVE_ANSWER_COUNT:2}
    insufficient-answer-max-score: ${AI_INTERVIEW_REPORT_INSUFFICIENT_ANSWER_MAX_SCORE:60}
    no-evidence-max-score: ${AI_INTERVIEW_REPORT_NO_EVIDENCE_MAX_SCORE:70}
    weak-job-match-max-score: ${AI_INTERVIEW_REPORT_WEAK_JOB_MATCH_MAX_SCORE:74}
    weak-answer-max-score: ${AI_INTERVIEW_REPORT_WEAK_ANSWER_MAX_SCORE:59}

volcengine:
  realtime:
    ws-url: wss://openspeech.bytedance.com/api/v3/realtime/dialogue
    app-id: ${VOLCENGINE_REALTIME_APP_ID:}
    access-key: ${VOLCENGINE_REALTIME_ACCESS_KEY:}
    resource-id: ${VOLCENGINE_REALTIME_RESOURCE_ID:volc.speech.dialog}
    app-key: ${VOLCENGINE_REALTIME_APP_KEY:}
    websocket-client: ${VOLCENGINE_REALTIME_WEBSOCKET_CLIENT:okhttp}
    connect-timeout-seconds: ${VOLCENGINE_REALTIME_CONNECT_TIMEOUT_SECONDS:10}
    speaker: ${VOLCENGINE_REALTIME_SPEAKER:zh_female_vv_jupiter_bigtts}
    dialog-model: ${VOLCENGINE_REALTIME_DIALOG_MODEL:1.2.1.1}
    input-audio-format: pcm_s16le
    output-audio-format: pcm_s16le
    sample-rate: 16000
    output-sample-rate: 24000
    channel: 1
    target-question-count: ${VOLCENGINE_REALTIME_TARGET_QUESTION_COUNT:8}
    max-question-count: ${VOLCENGINE_REALTIME_MAX_QUESTION_COUNT:12}
    closing-follow-up-turn-limit: ${VOLCENGINE_REALTIME_CLOSING_FOLLOW_UP_TURN_LIMIT:1}
    max-follow-up-per-topic: ${VOLCENGINE_REALTIME_MAX_FOLLOW_UP_PER_TOPIC:2}
    instructions: 你是一名专业、友善、克制的 AI 面试官。请围绕岗位 JD、能力要求和候选人简历进行中文面试。每次只问一个问题，问题要清晰、具体、适合口语回答。
wecom:
  enabled: true
  corp-id: ${WECOM_CORP_ID:}
  agent-id: ${WECOM_AGENT_ID:1000035}
  secret: ${WECOM_SECRET:}
  redirect-uri: ${WECOM_REDIRECT_URI:https://zook.kaixinzou.cn/login/wecom-callback}
  auto-create-user: true
  default-role-code: HR

security:
  jwt:
    secret: ${JWT_SECRET:change-me-prod-jwt-secret-at-least-32-chars}
    expires-in-seconds: ${JWT_EXPIRES_IN_SECONDS:86400}
