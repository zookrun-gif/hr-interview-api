services:
  hr-interview-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hr-interview-api:test
    container_name: hr-interview-api
    restart: always
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: test
      MYSQL_URL: ${MYSQL_URL:-}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      REDIS_HOST: ${REDIS_HOST:-localhost}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      VOLCENGINE_REALTIME_APP_ID: ${VOLCENGINE_REALTIME_APP_ID:-}
      VOLCENGINE_REALTIME_ACCESS_KEY: ${VOLCENGINE_REALTIME_ACCESS_KEY:-}
      VOLCENGINE_REALTIME_RESOURCE_ID: ${VOLCENGINE_REALTIME_RESOURCE_ID:-volc.speech.dialog}
      VOLCENGINE_REALTIME_APP_KEY: ${VOLCENGINE_REALTIME_APP_KEY:-}
      VOLCENGINE_REALTIME_SPEAKER: ${VOLCENGINE_REALTIME_SPEAKER:-zh_female_vv_jupiter_bigtts}
      VOLCENGINE_REALTIME_DIALOG_MODEL: ${VOLCENGINE_REALTIME_DIALOG_MODEL:-1.2.1.1}
      VOLCENGINE_RESUME_AI_API_KEY: ${VOLCENGINE_RESUME_AI_API_KEY:-}
      VOLCENGINE_RESUME_AI_MODEL: ${VOLCENGINE_RESUME_AI_MODEL:-}
      WECOM_CORP_ID: ${WECOM_CORP_ID:-}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID:-1000035}
      WECOM_SECRET: ${WECOM_SECRET:-}
      WECOM_REDIRECT_URI: ${WECOM_REDIRECT_URI:-https://zook.kaixinzou.cn/login/wecom-callback}
      JWT_SECRET: ${JWT_SECRET:-change-me-test-jwt-secret-at-least-32-chars}
      JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-604800}
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
